<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <title>Canary — x86-64 Linux in WASM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1rem; color: #58a6ff; }
    header .status { font-size: 0.8rem; color: #8b949e; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3fb950; display: inline-block;
    }
    #status-dot.loading { background: #f0883e; animation: pulse 1s infinite; }
    #status-dot.error   { background: #f85149; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    #terminal {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-info   { color: #c9d1d9; }
    .log-ok     { color: #3fb950; }
    .log-warn   { color: #f0883e; }
    .log-err    { color: #f85149; }
    .log-stdout { color: #79c0ff; }
    .log-stderr { color: #ffa657; }
    footer {
      padding: 4px 16px;
      background: #161b22;
      border-top: 1px solid #30363d;
      font-size: 0.75rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <header>
    <span id="status-dot" class="loading"></span>
    <h1>Canary x86-64</h1>
    <span class="status" id="status-text">Initialising…</span>
  </header>
  <canvas id="fb" width="1024" height="768"
    style="display:none; border:1px solid #30363d; max-width:100%; margin:8px 16px; background:#000;"></canvas>
  <div id="terminal"></div>
  <footer>Canary — from-scratch x86-64 Linux ELF emulator in WebAssembly</footer>

  <script type="module">
    import { canaryMain } from './canary-host.mjs';
    canaryMain();
  </script>
</body>
</html>
